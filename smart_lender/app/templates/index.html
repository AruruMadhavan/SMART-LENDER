<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Lender - Loan Eligibility Predictor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>💰 Smart Lender</h1>
    <p class="subtitle">Loan Eligibility Prediction System</p>

    <form action="/predict" method="post">
      <div class="grid">
        <div class="field">
          <label>Gender</label>
          <select name="gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>

        <div class="field">
          <label>Married</label>
          <select name="married" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="field">
          <label>Dependents</label>
          <select name="dependents" required>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3+">3+</option>
          </select>
        </div>

        <div class="field">
          <label>Education</label>
          <select name="education" required>
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
          </select>
        </div>

        <div class="field">
          <label>Self Employed</label>
          <select name="self_employed" required>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>

        <div class="field">
          <label>Property Area</label>
          <select name="property_area" required>
            <option value="Urban">Urban</option>
            <option value="Semiurban">Semiurban</option>
            <option value="Rural">Rural</option>
          </select>
        </div>

        <div class="field">
          <label>Applicant Income (₹/month)</label>
          <input type="number" name="applicant_income" min="0" step="1" required>
        </div>

        <div class="field">
          <label>Coapplicant Income (₹/month)</label>
          <input type="number" name="coapplicant_income" min="0" step="1" value="0" required>
        </div>

        <div class="field">
          <label>Loan Amount (in thousands ₹)</label>
          <input type="number" name="loan_amount" min="1" step="1" required>
        </div>

        <div class="field">
          <label>Loan Term (months)</label>
          <select name="loan_amount_term" required>
            <option value="360">360</option>
            <option value="180">180</option>
            <option value="120">120</option>
            <option value="240">240</option>
            <option value="84">84</option>
            <option value="300">300</option>
            <option value="60">60</option>
            <option value="36">36</option>
          </select>
        </div>

        <div class="field">
          <label>Credit History</label>
          <select name="credit_history" required>
            <option value="1">Good (1)</option>
            <option value="0">Poor (0)</option>
          </select>
        </div>
      </div>

      <button type="submit">Check Eligibility</button>
    </form>
  </div>
</body>
</html>
